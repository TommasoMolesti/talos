tasks:
  setup:
    command: "echo Setting up project"

  install:
    command: "echo Installing dependencies"

  db:
    command: "echo Starting database"

  migrate:
    command: "echo Running migrations"
    depends_on: ["db"]

  seed:
    command: "echo Seeding database"
    depends_on: ["migrate"]

  backend:
    command: "echo Starting backend"
    depends_on: ["install", "seed"]

  frontend:
    command: "echo Starting frontend"
    depends_on: ["install"]

  dev:
    command: "echo 🚀 Dev environment ready!"
    depends_on: ["backend", "frontend"]